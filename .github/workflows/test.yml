name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --frozen python -B -m unittest discover -s tests -v
      - run: uv run --frozen python -B -m py_compile common.py gmail.py gmail_auth.py outlook.py outlook_tokens.py outlook_setup.py server.py smoke_test.py
      - run: uv run --frozen python -B -c "import server; print('import ok')"
